<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>D2R Reimagined</title>
  <meta name="description" content="D2R Reimagined Mod Project">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="/">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_downward,arrow_upward,check,delete,info,language,menu,open_in_new,reset_settings,search,type_specimen,unknown_med" />
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Reimagined" />
  <link rel="manifest" href="/site.webmanifest" />
</head>

<body>
  <script>
    (function () {
      try {
        var fontAllowed = ['font-classic', 'font-resurrected', 'font-neutral'];
        var languageAllowed = ['enUS', 'koKR'];
        var storedFont = localStorage.getItem('font');
        var storedLanguage = localStorage.getItem('language');
        var fontCssClass = fontAllowed.indexOf(storedFont) !== -1 ? storedFont : 'font-resurrected';
        var languageType = languageAllowed.indexOf(storedLanguage) !== -1 ? storedLanguage : 'enUS';

        function applyFont(cls) {
          var b = document.body;
          if (!b) return false;
          for (var i = 0; i < fontAllowed.length; i++) b.classList.remove(fontAllowed[i]);
          b.classList.add(cls);
          return true;
        }

        function applyLanguage(cls) {
          var b = document.body;
          if (!b) return false;
          for (var i = 0; i < languageAllowed.length; i++) b.classList.remove(`language-${languageAllowed[i]}`);
          b.classList.add(cls);
          return true;
        }

        if (!applyFont(cssClass)) {
          document.addEventListener('DOMContentLoaded', function () { applyFont(fontCssClass); });
        }

        if (!applyLanguage(cssClass)) {
          document.addEventListener('DOMContentLoaded', function () { applyLanguage(languageType); });
        }
      } catch (e) { /* no-op */ }
    })();
  </script>
  <app></app>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
